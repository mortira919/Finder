<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkWork Lead Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dark: #8B6914;
    --marble: #0d0b08;
    --marble-2: #131008;
    --marble-3: #1a1508;
    --text: #E8DCC8;
    --text-dim: #8a7a5a;
    --red: #8B1A1A;
    --border: rgba(201,168,76,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--marble);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── MARBLE TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,26,26,0.04) 0%, transparent 50%),
      repeating-linear-gradient(
        105deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.015) 40px,
        rgba(201,168,76,0.015) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP BORDER ── */
  .imperial-border-top {
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), var(--gold), var(--gold-light), var(--gold), var(--gold-dark), transparent);
    position: relative;
    z-index: 10;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 20px 40px;
  }

  .eagle {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
    animation: floatEagle 4s ease-in-out infinite;
    filter: sepia(1) saturate(3) hue-rotate(5deg);
  }

  @keyframes floatEagle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .header-subtitle {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 40%, var(--gold-light) 60%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header-desc {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 1px;
    font-family: 'Cinzel', serif;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 0 auto 40px;
    max-width: 600px;
    padding: 0 20px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark));
  }
  .divider-line.right {
    background: linear-gradient(90deg, var(--gold-dark), transparent);
  }
  .divider-gem {
    width: 8px; height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
    box-shadow: 0 0 12px var(--gold);
  }

  /* ── MAIN CONTAINER ── */
  .container {
    position: relative;
    z-index: 10;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── PANEL ── */
  .panel {
    background: linear-gradient(145deg, rgba(26,21,8,0.95), rgba(13,11,8,0.98));
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .panel-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FORM ELEMENTS ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .panel { padding: 24px; }
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  input[type="text"], input[type="password"], select {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    color: var(--text);
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all 0.3s;
    width: 100%;
  }

  input[type="text"]:focus, input[type="password"]:focus, select:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  select option { background: #1a1508; }

  /* ── COUNTRY TOGGLE ── */
  .toggle-group {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .toggle-btn {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }

  .toggle-btn.active {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    color: var(--gold);
    box-shadow: inset 0 1px 0 rgba(201,168,76,0.3);
  }

  /* ── CATEGORIES ── */
  .categories-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .cat-tag {
    padding: 6px 14px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.25s;
    user-select: none;
    font-family: 'Inter', sans-serif;
  }

  .cat-tag.selected {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 10px rgba(201,168,76,0.1);
  }

  /* ── BUTTON ── */
  .btn-imperial {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #2a1f00, #4a3500, #2a1f00);
    border: 1px solid var(--gold-dark);
    border-radius: 2px;
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 8px;
  }

  .btn-imperial::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    transition: left 0.5s;
  }

  .btn-imperial:hover::before { left: 100%; }

  .btn-imperial:hover {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(201,168,76,0.2), inset 0 1px 0 rgba(201,168,76,0.3);
    color: var(--gold-light);
  }

  .btn-imperial:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-imperial:disabled::before { display: none; }

  /* ── PROGRESS ── */
  .progress-panel {
    display: none;
  }

  .progress-panel.visible {
    display: block;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .progress-message {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 16px;
    min-height: 20px;
  }

  .progress-bar-wrap {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 2px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(201,168,76,0.5);
    width: 0%;
  }

  /* ── RESULTS ── */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  @media (max-width: 500px) {
    .results-grid { grid-template-columns: 1fr; }
  }

  .stat-card {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: statReveal 0.5s ease forwards;
    opacity: 0;
  }

  .stat-card:nth-child(1) { animation-delay: 0.1s; }
  .stat-card:nth-child(2) { animation-delay: 0.2s; }
  .stat-card:nth-child(3) { animation-delay: 0.3s; }

  @keyframes statReveal {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .stat-card.hot {
    border-color: rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.05);
  }

  .stat-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
    margin-bottom: 4px;
  }

  .stat-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── DOWNLOAD BTN ── */
  .btn-download {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(139,26,26,0.3), rgba(180,30,30,0.2));
    border: 1px solid rgba(139,26,26,0.6);
    border-radius: 2px;
    color: #ffaaaa;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
  }

  .btn-download:hover {
    border-color: #cc3333;
    box-shadow: 0 0 20px rgba(139,26,26,0.3);
    color: #ffcccc;
  }

  /* ── COLUMNS DECO ── */
  .columns-deco {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px 0;
    opacity: 0.15;
  }

  .column {
    width: 12px;
    height: 80px;
    background: linear-gradient(180deg, var(--gold), transparent);
    border-radius: 1px;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
    opacity: 0.5;
  }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── ERROR ── */
  .error-msg {
    color: #ff6666;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-align: center;
    padding: 16px;
    border: 1px solid rgba(255,100,100,0.2);
    border-radius: 2px;
    background: rgba(139,26,26,0.1);
  }

  /* ── API KEY TOGGLE ── */
  .api-key-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .api-key-row input { flex: 1; }
  .eye-btn {
    padding: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 2px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    flex-shrink: 0;
  }
  .eye-btn:hover { border-color: var(--gold); color: var(--gold); }
</style>
</head>
<body>

<div class="imperial-border-top"></div>

<header>
  <span class="eagle">🦅</span>
  <div class="header-subtitle">Imperium Digitalis</div>
  <h1>Lead Finder</h1>
  <div class="header-desc">WorkWork Studio — Conquering Markets</div>
</header>

<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-gem"></div>
  <div class="divider-line right"></div>
</div>

<div class="container">

  <!-- ФОРМА -->
  <div class="panel" id="formPanel">
    <div class="panel-title">⚔ Параметры поиска</div>

    <div class="form-grid">
      <div class="form-group">
        <label>Город</label>
        <input type="text" id="city" value="Алматы" placeholder="Например: Алматы">
      </div>
      <div class="form-group">
        <label>Страна</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="btnKZ" onclick="setCountry('KZ')">🇰🇿 KZ</button>
          <button class="toggle-btn" id="btnRU" onclick="setCountry('RU')">🇷🇺 RU</button>
        </div>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Google Maps API Key</label>
      <div class="api-key-row">
        <input type="password" id="apiKey" placeholder="AIza...">
        <button class="eye-btn" onclick="toggleApiKey()">👁</button>
      </div>
    </div>

    <div class="form-group">
      <label>Категории бизнесов</label>
      <div class="categories-grid" id="categoriesGrid"></div>
    </div>

    <button class="btn-imperial" id="searchBtn" onclick="startSearch()">
      ⚔ &nbsp; Начать поход
    </button>
  </div>

  <!-- ПРОГРЕСС -->
  <div class="panel progress-panel" id="progressPanel">
    <div class="panel-title">⏳ Ход операции</div>
    <div class="progress-message" id="progressMsg">
      <span class="spinner"></span> Запуск...
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div id="resultsArea"></div>
  </div>

</div>

<div class="columns-deco">
  <div class="column"></div>
  <div class="column"></div>
  <div class="column"></div>
  <div class="column"></div>
  <div class="column"></div>
</div>

<div class="imperial-border-top"></div>

<footer>
  MMXXVI · WORKWORK STUDIO · OMNIA VINCIT LABOR
</footer>

<script>
  const CATEGORIES = [
    'ресторан', 'салон красоты', 'стоматология',
    'фитнес клуб', 'автосервис', 'магазин',
    'отель', 'аптека', 'юрист', 'турагентство',
    'детский сад', 'клининг', 'барбершоп'
  ];

  let selectedCats = new Set([
    'ресторан', 'салон красоты', 'стоматология',
    'фитнес клуб', 'автосервис', 'отель', 'аптека'
  ]);
  let country = 'KZ';
  let pollInterval = null;

  // Init categories
  const grid = document.getElementById('categoriesGrid');
  CATEGORIES.forEach(cat => {
    const tag = document.createElement('div');
    tag.className = 'cat-tag' + (selectedCats.has(cat) ? ' selected' : '');
    tag.textContent = cat;
    tag.onclick = () => {
      if (selectedCats.has(cat)) {
        selectedCats.delete(cat);
        tag.classList.remove('selected');
      } else {
        selectedCats.add(cat);
        tag.classList.add('selected');
      }
    };
    grid.appendChild(tag);
  });

  // Load saved API key
  const savedKey = localStorage.getItem('apiKey');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  function setCountry(c) {
    country = c;
    document.getElementById('btnKZ').classList.toggle('active', c === 'KZ');
    document.getElementById('btnRU').classList.toggle('active', c === 'RU');
  }

  function toggleApiKey() {
    const inp = document.getElementById('apiKey');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function startSearch() {
    const city = document.getElementById('city').value.trim();
    const apiKey = document.getElementById('apiKey').value.trim();

    if (!city) { alert('Введите город'); return; }
    if (!apiKey) { alert('Введите API ключ'); return; }
    if (selectedCats.size === 0) { alert('Выберите хотя бы одну категорию'); return; }

    localStorage.setItem('apiKey', apiKey);

    document.getElementById('searchBtn').disabled = true;
    document.getElementById('progressPanel').classList.add('visible');
    document.getElementById('resultsArea').innerHTML = '';
    document.getElementById('progressBar').style.width = '0%';

    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        city, country,
        categories: [...selectedCats],
        api_key: apiKey
      })
    });

    const { job_id } = await resp.json();
    pollInterval = setInterval(() => pollStatus(job_id), 1500);
  }

  async function pollStatus(jobId) {
    const resp = await fetch(`/api/status/${jobId}`);
    const job = await resp.json();

    document.getElementById('progressBar').style.width = job.progress + '%';

    if (job.status === 'done') {
      clearInterval(pollInterval);
      document.getElementById('progressMsg').innerHTML = '✦ ' + job.message;
      showResults(job, jobId);
      document.getElementById('searchBtn').disabled = false;
    } else if (job.status === 'error') {
      clearInterval(pollInterval);
      document.getElementById('progressMsg').innerHTML = '';
      document.getElementById('resultsArea').innerHTML =
        `<div class="error-msg">⚠ ${job.message}</div>`;
      document.getElementById('searchBtn').disabled = false;
    } else {
      document.getElementById('progressMsg').innerHTML =
        `<span class="spinner"></span> ${job.message}`;
    }
  }

  function showResults(job, jobId) {
    document.getElementById('resultsArea').innerHTML = `
      <div class="results-grid">
        <div class="stat-card">
          <span class="stat-num">${job.total_count}</span>
          <span class="stat-label">Компаний найдено</span>
        </div>
        <div class="stat-card">
          <span class="stat-num">${job.no_site_count}</span>
          <span class="stat-label">Без сайта</span>
        </div>
        <div class="stat-card hot">
          <span class="stat-num">${job.hot_count}</span>
          <span class="stat-label">Горячих лидов 🔥</span>
        </div>
      </div>
      <a class="btn-download" href="/api/download/${jobId}" download>
        📜 &nbsp; Скачать свиток (Excel)
      </a>
    `;
  }
</script>
</body>
</html>
